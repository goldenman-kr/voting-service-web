name: CI Guardrail Verification

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  guardrails:
    name: Guardrails, DB, build, and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: voting_service_web_ci
          POSTGRES_USER: voting_ci
          POSTGRES_PASSWORD: voting_ci_password_for_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voting_ci -d voting_service_web_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "postgresql://voting_ci:voting_ci_password_for_ci_only@localhost:5432/voting_service_web_ci?schema=public"
      APP_URL: "http://127.0.0.1:3100"
      PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3100"
      E2E_PORT: "3100"
      SESSION_SECRET: "ci-dummy-session-secret-32chars-minimum-value"
      ENCRYPTION_KEY: "ci-dummy-encryption-key-32chars-minimum"
      HMAC_KEY: "ci-dummy-hmac-key-32chars-minimum-value"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit high and critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Prisma validate
        run: npm run db:validate

      - name: Prisma generate
        run: npm run db:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed RBAC data
        run: npm run db:seed

      - name: Unit, integration, and guardrail tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright MVP smoke test
        run: npm run test:e2e

      - name: Cleanup E2E fixtures
        if: always()
        run: npm run test:e2e:clean
